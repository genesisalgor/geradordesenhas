<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GeradorSenha - Criptografia & Entropia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .main {
            width: 450px;
            margin: 50px auto;
        }

        .btn-purple {
            background-color: #6f42c1;
            border-color: #6f42c1;
            color: #fff;
            transition: all 0.2s ease-in-out; 
        }

        .btn-purple:hover {
            background-color: #59359a;
            border-color: #533190;
            color: #fff;
        }

        .btn-purple:active {
            background-color: #0d6efd !important;
            border-color: #0d6efd !important;
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.5) !important;
        }

        .form-control:focus {
            border-color: #a07cd8;
            box-shadow: 0 0 0 0.25rem rgba(111, 66, 193, 0.25);
        }
        .form-range::-webkit-slider-thumb { background: #6f42c1; }
        .form-range::-moz-range-thumb { background: #6f42c1; }
        
        .form-control.is-invalid::placeholder { color: #ea868f; }
        
        .form-control.is-valid {
            border-color: #198754;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        /* Transição suave da barra de força */
        .barra-forca {
            height: 6px;
            border-radius: 3px;
            transition: width 0.4s ease, background-color 0.4s ease;
            width: 0%;
        }
    </style>
  </head>
  <body>

    <div class="main p-4 border rounded shadow bg-body-tertiary">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0 h4 fw-bold">Gerador de Senha</h2>
        <button id="btn-tema" class="btn btn-outline-secondary btn-sm" aria-label="Alternar tema">
          <i id="icone-tema" class="bi bi-sun-fill"></i>
        </button>
      </div>

      <div class="input-group mb-2">
        <input type="password" id="campo-senha" class="form-control form-control-lg text-center font-monospace" placeholder="Sua Senha será Gerada Aqui" readonly>
        
        <button class="btn btn-outline-secondary" type="button" id="btn-visualizar" title="Mostrar/Ocultar Senha">
          <i id="icone-visualizar" class="bi bi-eye-slash-fill"></i>
        </button>
        
        <button class="btn btn-purple" type="button" id="btn-copiar" title="Copiar Senha">
          <i id="icone-copiar" class="bi bi-copy"></i>
        </button>
      </div>

      <div class="mb-3 px-1">
        <div class="progress" style="height: 6px; background-color: var(--bs-border-color);">
          <div id="indicador-forca" class="barra-forca"></div>
        </div>
        <div class="d-flex justify-content-between mt-1" style="font-size: 0.75rem;">
          <span id="metadados-entropia" class="text-secondary">0 bits</span>
          <span id="texto-forca" class="text-muted fw-bold">Defina os parâmetros</span>
        </div>
      </div>

      <div class="mb-3">
        <label for="tamanho-senha" class="form-label">Tamanho da senha: <span id="valor-tamanho" class="fw-bold">6</span> caracteres</label>
        <input type="range" class="form-range" id="tamanho-senha" min="6" max="15" value="6">
      </div>

      <div class="card p-3 mb-4 bg-body border-secondary-subtle">
        <div class="form-check mb-2">
          <input class="form-check-input chk-opcao" type="checkbox" id="chk-minusculas" data-tipo="minusculas" checked>
          <label class="form-check-label" for="chk-minusculas">Letras Minúsculas (a-z)</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input chk-opcao" type="checkbox" id="chk-maiusculas" data-tipo="maiusculas" checked>
          <label class="form-check-label" for="chk-maiusculas">Letras Maiúsculas (A-Z)</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input chk-opcao" type="checkbox" id="chk-numeros" data-tipo="numeros" checked>
          <label class="form-check-label" for="chk-numeros">Números (0-9)</label>
        </div>
        <div class="form-check">
          <input class="form-check-input chk-opcao" type="checkbox" id="chk-simbolos" data-tipo="simbolos">
          <label class="form-check-label" for="chk-simbolos">Símbolos (!@#$...)</label>
        </div>
      </div>

      <button id="botao-gerar" class="btn btn-purple w-100 py-2 fs-5 fw-bold">Gerar Senha</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const campoSenha = document.getElementById('campo-senha');
      const botaoGerar = document.getElementById('botao-gerar'); 
      const tamanhoSenha = document.getElementById('tamanho-senha');
      const valorTamanho = document.getElementById('valor-tamanho');
      const checkboxes = document.querySelectorAll('.chk-opcao');

      const btnTema = document.getElementById('btn-tema');
      const iconeTema = document.getElementById('icone-tema');
      const htmlTag = document.documentElement;

      const btnCopiar = document.getElementById('btn-copiar');
      const iconeCopiar = document.getElementById('icone-copiar');
      const btnVisualizar = document.getElementById('btn-visualizar');
      const iconeVisualizar = document.getElementById('icone-visualizar');

      // NOVO: Componentes do Medidor de Força
      const indicadorForca = document.getElementById('indicador-forca');
      const textoForca = document.getElementById('texto-forca');
      const metadadosEntropia = document.getElementById('metadados-entropia');

      const caracteres = {
        minusculas: 'abcdefghijklmnopqrstuvwxyz',
        maiusculas: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        numeros: '0123456789',
        simbolos: '!@#$%^&*()_+-=[]{}|;:,.<>?'
      };

      btnTema.addEventListener('click', () => {
        const novoTema = htmlTag.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        htmlTag.setAttribute('data-bs-theme', novoTema);
        iconeTema.className = novoTema === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      });

      tamanhoSenha.addEventListener('input', () => {
        valorTamanho.textContent = tamanhoSenha.value;
      });

      checkboxes.forEach(chk => {
        chk.addEventListener('change', () => {
          campoSenha.classList.remove('is-invalid', 'is-valid');
          if(campoSenha.value === '') campoSenha.type = "password";
          campoSenha.placeholder = "Sua Senha será Gerada Aqui";
        });
      });

      function obterCaractereAleatorio(stringDeCaracteres) {
        const arrayCripto = new Uint32Array(1);
        window.crypto.getRandomValues(arrayCripto);
        const indiceAleatorio = arrayCripto[0] % stringDeCaracteres.length;
        return stringDeCaracteres[indiceAleatorio];
      }

      // NOVO: Cálculo matemático de Entropia de Shannon
      function atualizarMedidorDeForca(comprimento, tamanhoPool) {
        if (tamanhoPool === 0) {
          indicadorForca.style.width = '0%';
          metadadosEntropia.textContent = '0 bits';
          textoForca.textContent = 'Defina os parâmetros';
          return;
        }

        // Fórmula: E = L * log2(R)
        const entropia = comprimento * Math.log2(tamanhoPool);
        metadadosEntropia.textContent = `${Math.round(entropia)} bits`;

        indicadorForca.classList.remove('bg-danger', 'bg-warning', 'bg-success');

        // Escores baseados em padrões de segurança de Entropia (NIST)
        if (entropia < 40) {
          indicadorForca.style.width = '33%';
          indicadorForca.classList.add('bg-danger');
          textoForca.textContent = 'Senha Fraca 🔴';
        } else if (entropia >= 40 && entropia < 60) {
          indicadorForca.style.width = '66%';
          indicadorForca.classList.add('bg-warning');
          textoForca.textContent = 'Senha Média 🟡';
        } else {
          indicadorForca.style.width = '100%';
          indicadorForca.classList.add('bg-success');
          textoForca.textContent = 'Senha Forte 🔥';
        }
      }

      function gerarSenha() {
        campoSenha.classList.remove('is-valid', 'is-invalid');
        
        let bancoDeCaracteres = '';
        let senhaGarantida = [];
        let poolSize = 0;

        checkboxes.forEach(chk => {
          if (chk.checked) {
            const tipo = chk.getAttribute('data-tipo');
            const pool = caracteres[tipo];
            if (pool) {
              bancoDeCaracteres += pool;
              poolSize += pool.length;
              senhaGarantida.push(obterCaractereAleatorio(pool));
            }
          }
        });

        if (bancoDeCaracteres === '') {
          campoSenha.type = 'text';
          campoSenha.classList.add('is-invalid');
          campoSenha.value = '';
          campoSenha.placeholder = 'Selecione ao menos uma opção!';
          atualizarMedidorDeForca(0, 0);
          return;
        }

        const comprimentoTotal = parseInt(tamanhoSenha.value);
        let senhaFinal = [...senhaGarantida];

        while (senhaFinal.length < comprimentoTotal) {
          senhaFinal.push(obterCaractereAleatorio(bancoDeCaracteres));
        }

        for (let i = 1; i < senhaFinal.length; i++) {
          const arrayCripto = new Uint32Array(1);
          window.crypto.getRandomValues(arrayCripto);
          const j = arrayCripto[0] % (i + 1);
          [senhaFinal[i],  senhaFinal[j]] = [senhaFinal[j], senhaFinal[i]];
        }

        campoSenha.value = senhaFinal.join('');
        iconeCopiar.className = 'bi bi-copy';

        // Dispara a avaliação com base na matemática exata dos conjuntos selecionados
        atualizarMedidorDeForca(comprimentoTotal, poolSize);
      }

      btnVisualizar.addEventListener('click', () => {
        if (campoSenha.classList.contains('is-invalid')) return;

        if (campoSenha.type === 'password') {
          campoSenha.type = 'text';
          iconeVisualizar.className = 'bi bi-eye-fill';
        } else {
          campoSenha.type = 'password';
          iconeVisualizar.className = 'bi bi-eye-slash-fill';
        }
      });

      btnCopiar.addEventListener('click', () => {
        const senha = campoSenha.value;
        if (!senha || campoSenha.classList.contains('is-invalid')) return;

        navigator.clipboard.writeText(senha).then(() => {
          iconeCopiar.className = 'bi bi-check-lg';
          campoSenha.classList.add('is-valid');
          
          setTimeout(() => {
            iconeCopiar.className = 'bi bi-copy';
            campoSenha.classList.remove('is-valid');
          }, 2000);
        }).catch(err => console.error('Erro ao copiar: ', err));
      });

      botaoGerar.addEventListener('click', gerarSenha);
    </script>
  </body>
</html>
